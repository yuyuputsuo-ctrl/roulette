<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Pro System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --green: #004d1a; --red: #d32f2f; --black: #1a1a1a; --gold: #ffd700; --active-chip: #ffeb3b; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: #002b0f; color: white; user-select: none; touch-action: manipulation; }
        
        /* ページ管理 */
        .page { display: none; padding: 10px; box-sizing: border-box; min-height: 100vh; }
        .active { display: flex; flex-direction: column; align-items: center; }

        /* ヘッダー・情報表示 */
        .info-bar { width: 100%; background: rgba(0,0,0,0.5); padding: 10px; text-align: center; border-bottom: 1px solid var(--gold); margin-bottom: 10px; }
        .win-display { font-size: 24px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        /* 本格ベッティングボード */
        .table-container { overflow-x: auto; width: 100%; display: flex; justify-content: flex-start; padding: 10px 0; }
        .betting-grid { display: grid; grid-template-columns: 50px repeat(12, 45px) 60px; grid-template-rows: repeat(3, 50px); gap: 2px; background: #fff; border: 2px solid #fff; }
        .cell { background: var(--green); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; position: relative; transition: 0.1s; }
        .cell:active { transform: scale(0.95); opacity: 0.8; }
        .n-red { background: var(--red); }
        .n-black { background: var(--black); }
        .n-zero { grid-row: 1 / 4; background: #2e7d32; }
        .col-btn { background: #003311; font-size: 10px; }

        /* 外部ベット（下段） */
        .outside-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; width: 100%; max-width: 590px; margin-top: 2px; height: 45px; }
        .outside-cell { background: #004d1a; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* チップ操作 */
        .chip-rack { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: center; gap: 15px; border-top: 2px solid var(--gold); }
        .chip { width: 45px; height: 45px; border-radius: 50%; border: 3px dashed rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px #000; }
        .chip.selected { border: 3px solid var(--active-chip); transform: translateY(-10px); box-shadow: 0 8px 20px rgba(255,235,59,0.4); }

        /* ディーラー（親）専用パネル */
        .dealer-panel { background: #222; width: 100%; padding: 20px; border-radius: 15px 15px 0 0; border-top: 3px solid var(--gold); margin-top: auto; }
        .dealer-input { font-size: 32px; width: 80px; text-align: center; border-radius: 10px; border: 2px solid var(--gold); background: #000; color: #fff; padding: 10px; }

        /* QR・初期設定 */
        #qrcode { background: white; padding: 15px; border-radius: 10px; margin: 20px; }
        .btn-main { background: var(--gold); color: #000; padding: 20px 40px; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-init" class="page">
    <h1 style="color:var(--gold); margin-top: 50px;">ROULETTE PRO</h1>
    <p>カジノ運営システムを開始します</p>
    <button class="btn-main" onclick="initDealer()">👑 親（ディーラー）として開始</button>
</div>

<div id="page-qr" class="page">
    <h2>Share Table QR</h2>
    <div id="qrcode"></div>
    <p>プレイヤーにスキャンさせてください</p>
    <button class="btn-main" style="background:white;" onclick="enterGame('oya')">テーブルへ移動</button>
</div>

<div id="page-game" class="page">
    <div class="info-bar">
        <div id="status-text" style="font-size: 12px; color: #aaa;">BETTING OPEN</div>
        <div id="win-display" class="win-display">??</div>
    </div>

    <div class="table-container">
        <div style="display: flex; flex-direction: column;">
            <div class="betting-grid" id="main-grid">
                <div class="cell n-zero" onclick="placeBet('0', 36)">0</div>
                </div>
            <div class="outside-grid">
                <div class="outside-cell" onclick="placeBet('1-12', 3)">1st 12</div>
                <div class="outside-cell" onclick="placeBet('13-24', 3)">2nd 12</div>
                <div class="outside-cell" onclick="placeBet('25-36', 3)">3rd 12</div>
                <div class="outside-cell" onclick="placeBet('1-18', 2)">Low</div>
                <div class="outside-cell" onclick="placeBet('EVEN', 2)">Even</div>
                <div class="outside-cell" onclick="placeBet('RED', 2)" style="background:var(--red);">Red</div>
                <div class="outside-cell" onclick="placeBet('BLACK', 2)" style="background:var(--black);">Black</div>
                <div class="outside-cell" onclick="placeBet('ODD', 2)">Odd</div>
                <div class="outside-cell" onclick="placeBet('19-36', 2)">High</div>
            </div>
        </div>
    </div>

    <div id="history-log" style="font-size: 10px; margin-top: 10px; color: #ccc;"></div>

    <div id="ui-ko" class="chip-rack" style="display:none;">
        <div class="chip" style="background:white; color:#000;" onclick="selectChip(1, this)">1</div>
        <div class="chip" style="background:red;" onclick="selectChip(5, this)">5</div>
        <div class="chip" style="background:blue;" onclick="selectChip(10, this)">10</div>
        <div class="chip" style="background:green;" onclick="selectChip(50, this)">50</div>
        <div class="chip" style="background:black;" onclick="selectChip(100, this)">100</div>
    </div>

    <div id="ui-oya" class="dealer-panel" style="display:none;">
        <div style="display:flex; justify-content: space-around; align-items: center;">
            <div>
                <span style="font-size: 12px;">WIN NUMBER</span><br>
                <input type="number" id="input-win" class="dealer-input" placeholder="0">
            </div>
            <button class="btn-main" style="padding: 15px 30px;" onclick="publishResult()">確定</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAQF7yOvsHJm_XCoEJEIO_odkrp2rdX24A",
        authDomain: "roulette-free.firebaseapp.com",
        databaseURL: "https://roulette-free-default-rtdb.firebaseio.com", 
        projectId: "roulette-free",
        storageBucket: "roulette-free.firebasestorage.app",
        messagingSenderId: "93578993705",
        appId: "1:93578993705:web:58e22e28ad6e28f4e77c38"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let roomId = new URLSearchParams(window.location.search).get("room");
    let myRole = "";
    let currentChip = 1;
    let myBets = [];

    const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

    // --- 自動判別ロジック ---
    window.addEventListener('load', () => {
        if (roomId) {
            myRole = "ko";
            enterGame('ko');
        } else {
            showPage('page-init');
        }
    });

    window.initDealer = function() {
        roomId = Math.random().toString(36).substring(2, 8);
        const url = window.location.origin + window.location.pathname + "?room=" + roomId;
        new QRCode(document.getElementById("qrcode"), { text: url, width: 200, height: 200 });
        window.history.pushState({}, '', url);
        myRole = "oya";
        showPage('page-qr');
    };

    window.enterGame = function(role) {
        myRole = role;
        renderNumbers();
        showPage('page-game');
        if (role === 'oya') document.getElementById('ui-oya').style.display = 'block';
        else document.getElementById('ui-ko').style.display = 'block';
        syncFirebase();
    };

    // --- ボード描画 ---
    function renderNumbers() {
        const grid = document.getElementById('main-grid');
        for (let i = 1; i <= 36; i++) {
            const cell = document.createElement('div');
            cell.className = `cell ${redNums.includes(i) ? 'n-red' : 'n-black'}`;
            cell.innerText = i;
            cell.style.gridRow = 4 - (i % 3 || 3);
            cell.style.gridColumn = Math.ceil(i / 3) + 1;
            cell.onclick = () => placeBet(i.toString(), 36);
            grid.appendChild(cell);
        }
    }

    // --- アクション ---
    window.selectChip = function(amt, el) {
        currentChip = amt;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
    };

    window.placeBet = function(target, odds) {
        if (myRole !== 'ko') return;
        const betData = { target, odds, amount: currentChip };
        myBets.push(betData);
        push(ref(db, `rooms/${roomId}/bets`), betData);
        
        document.getElementById('status-text').innerText = `${target}に${currentChip}枚 賭けました (${odds}x)`;
        if (window.navigator.vibrate) window.navigator.vibrate(40);
    }

    window.publishResult = function() {
        const val = document.getElementById('input-win').value;
        if (val === "") return;
        set(ref(db, `rooms/${roomId}/result`), { win: val, ts: Date.now() });
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- 同期 & 配当計算 ---
    function syncFirebase() {
        onValue(ref(db, `rooms/${roomId}/result`), (snap) => {
            if (snap.exists()) {
                const winNum = snap.val().win;
                document.getElementById('win-display').innerText = winNum;
                if (myRole === 'ko') calculatePayout(winNum);
            }
        });
    }

    function calculatePayout(winNum) {
        let totalWin = 0;
        const n = parseInt(winNum);
        
        myBets.forEach(bet => {
            let isHit = false;
            if (bet.target === winNum) isHit = true;
            else if (bet.target === 'RED' && redNums.includes(n)) isHit = true;
            else if (bet.target === 'BLACK' && !redNums.includes(n) && n !== 0) isHit = true;
            else if (bet.target === 'EVEN' && n % 2 === 0 && n !== 0) isHit = true;
            else if (bet.target === 'ODD' && n % 2 !== 0) isHit = true;
            // ... 他の条件（12sなど）も同様に追加可能
            
            if (isHit) totalWin += bet.amount * bet.odds;
        });

        const log = document.getElementById('history-log');
        log.innerHTML = `直近の結果: ${totalWin > 0 ? '当たり！ +' + totalWin : 'ハズレ'} <br>` + log.innerHTML;
        myBets = []; // リセット
    }
</script>

</body>
</html>
