<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本格ルーレット共有</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --green: #006400; --red: #d32f2f; --black: #212121; --gold: #ffd700; }
        body { font-family: sans-serif; margin: 0; background: var(--green); color: white; text-align: center; }
        .page { display: none; padding: 10px; }
        .active { display: block; }

        /* レイアウト：画像に近いテーブル配置 */
        .roulette-table { margin: 10px auto; border-collapse: collapse; background: white; color: white; font-size: 14px; }
        .roulette-table td { border: 1px solid white; width: 40px; height: 50px; text-align: center; cursor: pointer; position: relative; }
        .n-red { background: var(--red); }
        .n-black { background: var(--black); }
        .n-green { background: #2e7d32; }
        .outside { background: var(--green); color: white; font-size: 11px; }

        /* ボタン */
        .btn { padding: 15px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 80%; }
        .btn-oya { background: var(--gold); color: black; }
        .btn-ko { background: white; color: black; }

        #admin-panel { background: rgba(0,0,0,0.9); padding: 15px; position: fixed; bottom: 0; width: 100%; left: 0; box-sizing: border-box; }
        #qrcode { background: white; padding: 10px; display: inline-block; margin: 10px auto; }
        #qrcode img { margin: 0 auto; }
    </style>
</head>
<body>

<div id="page-select" class="page active">
    <h2>🎰 役割を選択</h2>
    <button class="btn btn-oya" onclick="startAs('oya')">👑 親（胴元）として開始</button>
    <button class="btn btn-ko" onclick="startAs('ko')">👤 子（参加者）として開始</button>
    
    <div id="qr-area" style="display:none; margin-top: 20px;">
        <p>子に読ませてください</p>
        <div id="qrcode"></div>
        <p id="room-url" style="font-size: 10px; word-break: break-all;"></p>
        <button class="btn" onclick="goToGame()" style="background:orange;">QRを閉じてゲーム画面へ</button>
    </div>
</div>

<div id="page-game" class="page">
    <div id="result-msg" style="background: yellow; color: black; font-weight: bold; padding: 5px; margin-bottom: 5px;">
        結果待ち...
    </div>

    <table class="roulette-table">
        <tr>
            <td rowspan="3" class="n-green" onclick="bet('0')">0</td>
            <td class="n-red" onclick="bet(3)">3</td><td class="n-black" onclick="bet(6)">6</td><td class="n-red" onclick="bet(9)">9</td>
        </tr>
        <tr>
            <td class="n-black" onclick="bet(2)">2</td><td class="n-red" onclick="bet(5)">5</td><td class="n-black" onclick="bet(8)">8</td>
        </tr>
        <tr>
            <td class="n-red" onclick="bet(1)">1</td><td class="n-black" onclick="bet(4)">4</td><td class="n-red" onclick="bet(7)">7</td>
        </tr>
        <tr>
            <td class="outside" colspan="1" onclick="bet('1-18')">1-18</td>
            <td class="outside" colspan="1" onclick="bet('EVEN')">EVEN</td>
            <td class="outside" colspan="1" onclick="bet('RED')" style="background:red;">RED</td>
            <td class="outside" colspan="1" onclick="bet('BLACK')" style="background:black;">BLACK</td>
        </tr>
    </table>
    <p style="font-size: 10px;">※複数箇所タップして賭けられます</p>

    <div id="admin-panel" style="display:none;">
        <input id="win-num" type="text" placeholder="当選番号" style="padding:10px; width:60%;">
        <button onclick="sendResult()" style="padding:10px; background:var(--gold);">確定</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAQF7yOvsHJm_XCoEJEIO_odkrp2rdX24A",
        authDomain: "roulette-free.firebaseapp.com",
        databaseURL: "https://roulette-free-default-rtdb.firebaseio.com", 
        projectId: "roulette-free",
        storageBucket: "roulette-free.firebasestorage.app",
        messagingSenderId: "93578993705",
        appId: "1:93578993705:web:58e22e28ad6e28f4e77c38"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let roomId = new URLSearchParams(window.location.search).get("room");
    let myRole = "";

    window.startAs = function(role) {
        myRole = role;
        if (role === 'oya') {
            // 親：必ず新しい部屋を作る、または現在の部屋を維持
            if (!roomId) roomId = Math.random().toString(36).substring(2, 8);
            const url = window.location.origin + window.location.pathname + "?room=" + roomId;
            
            // QR強制表示
            document.getElementById('qr-area').style.display = 'block';
            document.getElementById('room-url').innerText = url;
            const qrElem = document.getElementById("qrcode");
            qrElem.innerHTML = "";
            new QRCode(qrElem, { text: url, width: 150, height: 150 });
            
            window.history.pushState({}, '', url);
        } else {
            goToGame();
        }
    };

    window.goToGame = function() {
        document.getElementById('page-select').classList.remove('active');
        document.getElementById('page-game').classList.add('active');
        if (myRole === 'oya') document.getElementById('admin-panel').style.display = 'block';
        listenData();
    };

    window.bet = function(val) {
        if (myRole !== 'ko') return;
        if (!roomId) return alert("ルームIDがありません");
        push(ref(db, `rooms/${roomId}/bets`), { val: val, user: "Player" });
        alert(val + " に賭けました");
    };

    window.sendResult = function() {
        const val = document.getElementById('win-num').value;
        set(ref(db, `rooms/${roomId}/result`), { val: val });
    };

    function listenData() {
        if (!roomId) return;
        onValue(ref(db, `rooms/${roomId}/result`), (snap) => {
            if (snap.exists()) {
                document.getElementById('result-msg').innerText = "当選番号： " + snap.val().val;
            }
        });
    }
</script>
</body>
</html>
