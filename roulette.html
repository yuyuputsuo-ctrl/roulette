<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ルーレット配当計算マネージャー</title>
    <style>
        :root {
            --green: #008151;
            --red: #e63946;
            --black: #1d3557;
            --gold: #ffb703;
            --white: #f1faee;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2b2d42;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: var(--gold); margin-bottom: 10px; }

        .container {
            background: #3d405b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }

        .section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #555;
        }

        label { display: block; margin-bottom: 8px; font-weight: bold; }

        /* 入力エリア */
        .grid-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 1.1rem;
        }

        /* 当選番号ボタン */
        .number-selector {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .num-btn {
            padding: 10px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background: #666;
            color: white;
        }

        .num-btn.red { background-color: var(--red); }
        .num-btn.black { background-color: var(--black); }
        .num-btn.green { background-color: var(--green); }
        .num-btn.selected { outline: 3px solid var(--gold); transform: scale(1.05); }

        /* 結果表示 */
        #result-area {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .payout-item {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px dashed #666;
        }

        .total-box {
            font-size: 1.8rem;
            color: var(--gold);
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }

        .history {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>
<body>

<h1>Roulette Calculator</h1>

<div class="container">
    <div class="section">
        <label>1. 賭け金額を入力 (1チップあたりの単価)</label>
        <input type="number" id="bet-amount" value="100" min="0" step="100">
    </div>

    <div class="section">
        <label>2. 賭け方を選択</label>
        <select id="bet-type">
            <option value="36">1点賭け (Straight Up) - 36倍</option>
            <option value="18">2点賭け (Split) - 18倍</option>
            <option value="12">3点賭け (Street) - 12倍</option>
            <option value="9">4点賭け (Corner) - 9倍</option>
            <option value="6">6点賭け (Line) - 6倍</option>
            <option value="3">ダズン / カラム - 3倍</option>
            <option value="2">赤黒 / 偶奇 / 低高 - 2倍</option>
        </select>
    </div>

    <div class="section">
        <label>3. 当選番号（または当たり判定）</label>
        <div class="number-selector" id="number-grid">
            </div>
    </div>

    <div id="result-area">
        <div class="payout-item">
            <span>判定:</span>
            <span id="hit-status">---</span>
        </div>
        <div class="payout-item">
            <span>配当倍率:</span>
            <span id="multiplier">x0</span>
        </div>
        <div class="total-box">
            払戻金: ¥<span id="total-payout">0</span>
        </div>
    </div>
    
    <div class="history" id="history-log">
        履歴: なし
    </div>
</div>

<script>
    const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    const grid = document.getElementById('number-grid');
    let selectedNum = null;

    // 番号ボタンの生成
    for (let i = 0; i <= 36; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.classList.add('num-btn');
        if (i === 0) btn.classList.add('green');
        else if (redNumbers.includes(i)) btn.classList.add('red');
        else btn.classList.add('black');

        btn.onclick = () => selectNumber(i, btn);
        grid.appendChild(btn);
    }

    function selectNumber(num, element) {
        // 見た目の更新
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
        element.classList.add('selected');
        selectedNum = num;
        
        calculate();
    }

    function calculate() {
        const bet = parseFloat(document.getElementById('bet-amount').value);
        const rate = parseInt(document.getElementById('bet-type').value);
        
        if (selectedNum === null) return;

        // 本来はここに「その数字が当たりか」のロジックを入れますが、
        // 計算機として使う場合、「当たり番号を選択＝当たり」として計算します。
        const payout = bet * rate;

        // 表示更新
        document.getElementById('hit-status').innerText = "WIN (番号: " + selectedNum + ")";
        document.getElementById('multiplier').innerText = "x" + rate;
        document.getElementById('total-payout').innerText = payout.toLocaleString();

        // 履歴の更新
        const log = document.getElementById('history-log');
        log.innerText = `前回: ${selectedNum}番で ¥${payout.toLocaleString()} の払い戻し`;
    }

    // 設定変更時も再計算
    document.getElementById('bet-amount').oninput = calculate;
    document.getElementById('bet-type').onchange = calculate;

</script>
</body>
</html>
